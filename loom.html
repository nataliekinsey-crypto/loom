<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Loom</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf9f7;
    --card: #ffffff;
    --border: #e8e5e0;
    --text: #2d2a26;
    --text-mid: #5c5750;
    --text-light: #9b9589;
    --text-faint: #c4beb4;
    --fog: #8b7bb5;
    --fog-bg: #f0ecf7;
    --fog-border: #d4cce8;
    --foundation: #b8913a;
    --foundation-bg: #faf3e0;
    --foundation-border: #e8d9a8;
    --motion: #4a8c6a;
    --motion-bg: #e8f5ee;
    --motion-border: #b4dbc8;
    --simmer: #5a8fa8;
    --simmer-bg: #e6f1f7;
    --simmer-border: #b0d1e0;
    --deep: #4a5899;
    --mid-tier: #b8913a;
    --couch-tier: #4a8c6a;
    --danger: #c45c5c;
    --accent: #2d2a26;
  }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  .header .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
    letter-spacing: 0.03em;
  }
  .header .last-check {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 4px;
  }
  .header .last-check .stale {
    color: var(--foundation);
  }

  /* Top buttons */
  .top-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--card);
    color: var(--text-mid);
    flex: 1;
  }
  .btn:hover { background: var(--bg); border-color: var(--text-light); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #1a1815; }
  .btn-sm {
    padding: 5px 12px;
    font-size: 12px;
    flex: none;
  }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: #fdf0f0; }

  /* Gauge panel */
  .gauge-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    display: none;
  }
  .gauge-panel.open { display: block; }
  .gauge-panel p {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .gauge-row {
    display: flex;
    gap: 8px;
  }
  .gauge-warning {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--foundation);
    background: var(--foundation-bg);
    padding: 10px 14px;
    border-radius: 6px;
    margin-top: 10px;
  }
  .gauge-warning a { color: var(--foundation); }

  /* Thread card */
  .thread-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .thread-inner { padding: 18px; }
  .thread-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .thread-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .thread-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
  .state-badge {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .state-badge:hover { opacity: 0.75; }
  .state-fog { background: var(--fog-bg); color: var(--fog); border-color: var(--fog-border); }
  .state-foundation { background: var(--foundation-bg); color: var(--foundation); border-color: var(--foundation-border); }
  .state-motion { background: var(--motion-bg); color: var(--motion); border-color: var(--motion-border); }
  .state-simmer { background: var(--simmer-bg); color: var(--simmer); border-color: var(--simmer-border); }

  .state-desc {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    margin-top: 10px;
  }
  .fog-timer {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--fog);
    margin-top: 4px;
  }

  /* Next touch */
  .touch-box {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px;
    margin-top: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .touch-box:hover { background: #f2f0ec; }
  .touch-tier {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tier-deep { color: var(--deep); }
  .tier-midstream { color: var(--mid-tier); }
  .tier-couch { color: var(--couch-tier); }
  .touch-text {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.5;
  }
  .edit-hint {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--text-faint);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .touch-box:hover .edit-hint { opacity: 1; }

  /* Edit form */
  .edit-form { margin-top: 14px; }
  .edit-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 60px;
    color: var(--text);
    line-height: 1.5;
  }
  .edit-form textarea:focus { outline: 2px solid var(--text-light); outline-offset: -1px; }
  .edit-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .edit-row select {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--text-mid);
  }

  /* Sections */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .faint {
    font-weight: 400;
    color: var(--text-faint);
    font-size: 12px;
  }
  .section-title-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0;
    width: 100%;
    text-align: left;
  }

  /* List items */
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
  }
  .list-dot { color: var(--text-faint); flex-shrink: 0; margin-top: 2px; }
  .list-item .remove-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 11px;
    flex-shrink: 0;
    opacity: 0;
    transition: all 0.15s;
    padding: 2px 4px;
  }
  .list-item:hover .remove-btn { opacity: 1; }
  .list-item .remove-btn:hover { color: var(--danger); }
  .list-empty {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
    padding: 4px 0;
  }

  /* Add row */
  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .add-row input {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
  }
  .add-row input:focus { outline: 2px solid var(--text-light); outline-offset: -1px; }

  /* Decision log item */
  .decision-item {
    display: flex;
    gap: 10px;
    padding: 5px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-mid);
  }
  .decision-date {
    color: var(--text-faint);
    flex-shrink: 0;
    font-size: 11px;
    margin-top: 2px;
  }

  /* Fork section */
  .fork-note {
    font-size: 14px;
    color: var(--text-mid);
    margin-top: 10px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .fork-note:hover { color: var(--text); }
  .fork-legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    flex-wrap: wrap;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .footer-quote {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
  }
  .footer-actions {
    display: flex;
    gap: 6px;
  }
  .footer-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .footer-btn:hover { color: var(--text-mid); background: var(--bg); }
  .footer-btn.danger:hover { color: var(--danger); }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Hidden file input */
  #import-input { display: none; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>
<input type="file" id="import-input" accept=".json">

<script>
const STORAGE_KEY = 'greening-loom-state';
const STATES = ['fog','foundation','motion','simmer'];
const STATE_META = {
  fog: { label:'Fog', class:'state-fog', desc:'Core decisions unmade. Only deciding conversations allowed.' },
  foundation: { label:'Foundation', class:'state-foundation', desc:'Decisions made, structure building. Deep or midstream attention.' },
  motion: { label:'Motion', class:'state-motion', desc:'Producing on a rhythm. Flow lives here.' },
  simmer: { label:'Simmer', class:'state-simmer', desc:'Deliberately slow. Small pleasurable touches, no pressure.' }
};
const TIER_META = {
  'deep-water': { label:'Deep Water', icon:'◆', class:'tier-deep' },
  'midstream': { label:'Midstream', icon:'◈', class:'tier-midstream' },
  'couch': { label:'Couch', icon:'○', class:'tier-couch' }
};

const DEFAULT_STATE = {
  threads: [
    { id:'green-cell', name:'The Green Cell', subtitle:'podcast + connection list', state:'fog',
      nextTouch:'One deciding conversation to name the play function. Nothing else is legal on this thread until the fog converts.',
      tier:'deep-water', fogTimer:1 },
    { id:'writing-line', name:'The Writing Line', subtitle:'Substack + Mailchimp newsletter + book', state:'motion',
      nextTouch:'Finish and send the Mailchimp newsletter.',
      tier:'midstream', fogTimer:0 },
    { id:'labs-line', name:'The Labs Line', subtitle:'labs + page + pricing + money infrastructure', state:'foundation',
      nextTouch:'The pricing decision, made once, out loud, with the sacral. Everything downstream becomes couch work after.',
      tier:'deep-water', fogTimer:0 },
    { id:'tpn-trunk', name:'Play Network Trunk', subtitle:'model development, web, marketing (guilds → season tracker)', state:'motion',
      nextTouch:'Pull one web task from the couch queue during the next comfort-movie evening.',
      tier:'couch', fogTimer:0 }
  ],
  couchQueue: [
    'Substack settings cleanup — confirm unsubscribe damage, resubscribe path if any',
    'Website link plumbing once lab pricing lands',
    'Mailchimp newsletter formatting and send mechanics',
    'Green map webpage scaffolding (structure only; meaning waits on Green Cell fog)'
  ],
  decisionsLog: [
    { date:'2026-07-12', text:'Field consolidated from eight nominal projects to four threads. Newsletter (Mailchimp) folded into Writing Line, money infrastructure folded into Labs, connection list folded into Green Cell.' }
  ],
  writingForkNote: 'Distribution touches outnumber composition until subscriber growth substantiates inverting.',
  lastCheckIn: null,
  lastGaugeRead: null
};

let data = null;
let editingTouch = null;
let showGauge = false;
let showDecisions = false;
let editingFork = false;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      data = { ...DEFAULT_STATE, ...JSON.parse(raw) };
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  render();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

function cycleState(threadId) {
  const t = data.threads.find(x => x.id === threadId);
  const idx = STATES.indexOf(t.state);
  t.state = STATES[(idx + 1) % STATES.length];
  if (t.state === 'fog') t.fogTimer = 1;
  else if (STATES[idx] === 'fog') t.fogTimer = 0;
  save();
}

function removeCouchItem(idx) {
  data.couchQueue.splice(idx, 1);
  save();
}

function addCouchItem() {
  const input = document.getElementById('couch-input');
  const val = input.value.trim();
  if (!val) return;
  data.couchQueue.push(val);
  input.value = '';
  save();
}

function addDecision() {
  const input = document.getElementById('decision-input');
  const val = input.value.trim();
  if (!val) return;
  data.decisionsLog.unshift({ date: new Date().toISOString().split('T')[0], text: val });
  input.value = '';
  save();
}

function saveTouch(threadId) {
  const t = data.threads.find(x => x.id === threadId);
  const textarea = document.getElementById('touch-edit-text');
  const select = document.getElementById('touch-edit-tier');
  t.nextTouch = textarea.value;
  t.tier = select.value;
  editingTouch = null;
  save();
}

function saveFork() {
  const textarea = document.getElementById('fork-edit-text');
  data.writingForkNote = textarea.value;
  editingFork = false;
  save();
}

function saveGauge() {
  const input = document.getElementById('gauge-input');
  const val = input.value.trim();
  if (!val) return;
  data.lastGaugeRead = { value: val, date: new Date().toISOString() };
  showGauge = false;
  save();
}

function buildClaudeText() {
  let lines = ['Loom check. Here\'s the current ledger state:\n'];
  data.threads.forEach(t => {
    const sm = STATE_META[t.state];
    const tm = TIER_META[t.tier];
    let line = `${t.name} [${sm.label}]: Next touch (${tm.label}): ${t.nextTouch}`;
    if (t.state === 'fog') line += ` | Fog timer: check-in ${t.fogTimer} of 3`;
    lines.push(line);
  });
  lines.push('');
  if (data.couchQueue.length) {
    lines.push('Couch queue: ' + data.couchQueue.join('; '));
  } else {
    lines.push('Couch queue: empty');
  }
  lines.push('');
  lines.push('Writing fork: ' + data.writingForkNote);
  if (data.lastGaugeRead) {
    lines.push('Last gauge: ' + data.lastGaugeRead.value + ' (' + new Date(data.lastGaugeRead.date).toLocaleDateString() + ')');
  } else {
    lines.push('No gauge read yet.');
  }
  lines.push('');
  lines.push('Last check-in: ' + (data.lastCheckIn || 'never'));
  return lines.join('\n');
}

function copyForClaude() {
  const text = buildClaudeText();
  navigator.clipboard.writeText(text).then(() => {
    data.lastCheckIn = new Date().toISOString().split('T')[0];
    save();
    toast('Copied — paste into Claude and say "loom check"');
  }).catch(() => toast('Copy failed — try again'));
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'loom-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup saved');
}

function importData() {
  document.getElementById('import-input').click();
}

document.getElementById('import-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.threads && imported.couchQueue) {
        data = { ...DEFAULT_STATE, ...imported };
        save();
        toast('Loom restored from backup');
      } else {
        toast('Invalid backup file');
      }
    } catch(err) { toast('Could not read file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function resetAll() {
  if (confirm('Reset the entire Loom to its seed state? This cannot be undone.')) {
    data = JSON.parse(JSON.stringify(DEFAULT_STATE));
    save();
    toast('Reset to seed');
  }
}

function render() {
  const app = document.getElementById('app');
  const ds = daysSince(data.lastCheckIn);
  const staleClass = ds !== null && ds > 10 ? 'stale' : '';

  let html = `
    <div class="header">
      <h1>The Loom</h1>
      <div class="subtitle">four threads, one shuttle, one fabric</div>
      ${data.lastCheckIn ? `<div class="last-check">Last check-in: ${data.lastCheckIn}${ds > 10 ? ` <span class="${staleClass}">(${ds} days ago)</span>` : ''}</div>` : ''}
    </div>

    <div class="top-buttons">
      <button class="btn" onclick="showGauge=!showGauge;render()">
        ${data.lastGaugeRead ? 'Gauge: ' + esc(data.lastGaugeRead.value) : 'Take gauge read'}
      </button>
      <button class="btn btn-primary" onclick="copyForClaude()">
        Copy for Claude →
      </button>
    </div>
  `;

  if (showGauge) {
    const gv = data.lastGaugeRead ? data.lastGaugeRead.value : '';
    html += `
      <div class="gauge-panel open">
        <p>Hartmann Energy Gauge on the field right now. Minus anything or flat zero → focus wheel, FYFF, or tapping first. Plus-side → the gate is open.</p>
        <div class="gauge-row">
          <input type="text" id="gauge-input" value="" placeholder="e.g. +3, -2, 0, +7..." style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);">
          <button class="btn btn-sm" onclick="saveGauge()">Save</button>
        </div>
        <div class="gauge-warning" id="gauge-warn" style="display:none">
          Gate closed. <a href="https://nataliekinsey-crypto.github.io/focuswheel/" target="_blank">Focus wheel</a>, FYFF, or tapping until it clears.
        </div>
      </div>
    `;
  }

  // Threads
  data.threads.forEach(t => {
    const sm = STATE_META[t.state];
    const tm = TIER_META[t.tier];
    const isEditing = editingTouch === t.id;

    html += `<div class="thread-card"><div class="thread-inner">`;
    html += `<div class="thread-top">
      <div>
        <div class="thread-name">${esc(t.name)}</div>
        <div class="thread-subtitle">${esc(t.subtitle)}</div>
      </div>
      <button class="state-badge ${sm.class}" onclick="cycleState('${t.id}')" title="Click to cycle state">${sm.label}</button>
    </div>`;
    html += `<div class="state-desc">${sm.desc}</div>`;
    if (t.state === 'fog' && t.fogTimer > 0) {
      html += `<div class="fog-timer">Fog timer: check-in ${t.fogTimer} of 3${t.fogTimer >= 3 ? ' — decision time: alive or Simmer?' : ''}</div>`;
    }

    if (isEditing) {
      html += `<div class="edit-form">
        <textarea id="touch-edit-text" rows="3">${esc(t.nextTouch)}</textarea>
        <div class="edit-row">
          <select id="touch-edit-tier">
            <option value="deep-water" ${t.tier==='deep-water'?'selected':''}>◆ Deep Water</option>
            <option value="midstream" ${t.tier==='midstream'?'selected':''}>◈ Midstream</option>
            <option value="couch" ${t.tier==='couch'?'selected':''}>○ Couch</option>
          </select>
          <button class="btn btn-sm" onclick="saveTouch('${t.id}')">Save</button>
          <button class="btn btn-sm" onclick="editingTouch=null;render()">Cancel</button>
        </div>
      </div>`;
    } else {
      html += `<div class="touch-box" onclick="editingTouch='${t.id}';render()">
        <div class="touch-tier">
          <span class="${tm.class}">${tm.icon} ${tm.label}</span>
          <span class="edit-hint">click to edit</span>
        </div>
        <div class="touch-text">${esc(t.nextTouch)}</div>
      </div>`;
    }
    html += `</div></div>`;
  });

  // Writing fork
  html += `<div class="section">
    <div class="section-title"><span>✦</span> Writing Fork</div>`;
  if (editingFork) {
    html += `<div class="edit-form" style="margin-top:10px">
      <textarea id="fork-edit-text" rows="2">${esc(data.writingForkNote)}</textarea>
      <div class="edit-row">
        <button class="btn btn-sm" onclick="saveFork()">Save</button>
        <button class="btn btn-sm" onclick="editingFork=false;render()">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<div class="fork-note" onclick="editingFork=true;render()">${esc(data.writingForkNote)}</div>`;
  }
  html += `<div class="fork-legend">
    <span>Book → depth that compounds</span>
    <span>Strategy → built for scrollers</span>
    <span>Note → distribution touch</span>
  </div></div>`;

  // Couch queue
  html += `<div class="section">
    <div class="section-title"><span>○</span> Couch Queue <span class="faint">comfort-movie hours are real hours</span></div>
    <div style="margin-top:10px">`;
  if (data.couchQueue.length === 0) {
    html += `<div class="list-empty">Queue empty. Nice.</div>`;
  }
  data.couchQueue.forEach((item, idx) => {
    html += `<div class="list-item">
      <span class="list-dot">·</span>
      <span style="flex:1">${esc(item)}</span>
      <button class="remove-btn" onclick="removeCouchItem(${idx})" title="Remove">✕</button>
    </div>`;
  });
  html += `</div>
    <div class="add-row">
      <input type="text" id="couch-input" placeholder="Add to queue..." onkeydown="if(event.key==='Enter')addCouchItem()">
      <button class="btn btn-sm" onclick="addCouchItem()">Add</button>
    </div>
  </div>`;

  // Decisions log
  html += `<div class="section">
    <button class="section-title-btn" onclick="showDecisions=!showDecisions;render()">
      <span>${showDecisions ? '▾' : '▸'}</span> Decisions Log <span class="faint">${data.decisionsLog.length} recorded</span>
    </button>`;
  if (showDecisions) {
    html += `<div class="add-row" style="margin-top:12px">
      <input type="text" id="decision-input" placeholder="Log a decision..." onkeydown="if(event.key==='Enter')addDecision()">
      <button class="btn btn-sm" onclick="addDecision()">Log</button>
    </div>
    <div style="margin-top:10px">`;
    data.decisionsLog.forEach(d => {
      html += `<div class="decision-item">
        <span class="decision-date">${esc(d.date)}</span>
        <span>${esc(d.text)}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // Footer
  html += `<div class="footer">
    <span class="footer-quote">The hopping is the engine. The Loom's job is clean landings.</span>
    <div class="footer-actions">
      <button class="footer-btn" onclick="exportData()" title="Save backup">Export</button>
      <button class="footer-btn" onclick="importData()" title="Restore backup">Import</button>
      <button class="footer-btn danger" onclick="resetAll()" title="Reset to seed">Reset</button>
    </div>
  </div>`;

  app.innerHTML = html;

  // Wire up gauge warning
  if (showGauge) {
    const gi = document.getElementById('gauge-input');
    if (gi) {
      gi.addEventListener('input', function() {
        const warn = document.getElementById('gauge-warn');
        const num = parseInt(this.value);
        if (warn) warn.style.display = (!isNaN(num) && num <= 0) ? 'block' : 'none';
      });
    }
  }
}

load();
</script>
</body>
</html>
