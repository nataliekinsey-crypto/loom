<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Loom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F4EC;min-height:100vh;font-family:system-ui,-apple-system,sans-serif;color:#1F2A21;padding:22px 18px}
h1{font-family:Georgia,'Times New Roman',serif;font-size:26px;color:#1F2A21;letter-spacing:-0.01em;font-weight:700}
h2{font-size:17px;font-weight:600;color:#1F2A21}
h3{font-size:15px;font-weight:700;color:#1F2A21}
input,select,textarea{font-family:inherit;color:#1F2A21;background:#fff;border:1px solid #DDE0D3;border-radius:7px;outline:none;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:#4C6B4F}
button{font-family:inherit;cursor:pointer}
a{color:#4C6B4F}
.wrap{max-width:780px;margin:0 auto}
.card{background:#fff;border:1px solid #DDE0D3;border-radius:10px;padding:13px 16px;margin-bottom:12px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.muted{color:#8A968B;font-size:12px}
.soft{color:#5C6B5E}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORAGE_KEY = "greening-loom-v2";
const C = {
  ink:"#1F2A21",soft:"#5C6B5E",faint:"#8A968B",paper:"#F5F4EC",card:"#FFFFFF",
  line:"#DDE0D3",moss:"#4C6B4F",mossPale:"#E7EEE4",copper:"#A8663A",copperPale:"#F5E9DE",
  slate:"#6B7686",slatePale:"#E8EBEF",violet:"#75648A",violetPale:"#ECE7F1",
  madder:"#A3452F",madderPale:"#F6E5DF"
};
const STATES={
  fog:{label:"Fog",color:C.slate,pale:C.slatePale,note:"deciding conversations only"},
  foundation:{label:"Foundation",color:C.copper,pale:C.copperPale,note:"structure being built"},
  motion:{label:"Motion",color:C.moss,pale:C.mossPale,note:"producing on a rhythm"},
  simmer:{label:"Simmer",color:C.violet,pale:C.violetPale,note:"slow on purpose, never guilted"}
};
const STATE_ORDER=["fog","foundation","motion","simmer"];
const TIERS={
  "deep-water":{label:"Deep water",color:C.moss},
  midstream:{label:"Midstream",color:C.copper},
  couch:{label:"Couch",color:C.slate}
};
const TIER_ORDER=["deep-water","midstream","couch"];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let _id=0;
const uid=()=>`${Date.now().toString(36)}-${(_id++).toString(36)}-${Math.random().toString(36).slice(2,6)}`;
const step=(text,pressure=2,today=false)=>({id:uid(),text,pressure,done:false,today});

const DEFAULT_STATE={
  gauge:null,
  threads:[
    {id:"green-cell",name:"The Green Cell",subtitle:"podcast + connection list",state:"fog",tier:"deep-water",
     nextTouch:"One deciding conversation to name the play function. Nothing else is legal on this thread until the fog converts.",
     open:false,steps:[
       step("Write three candidate answers to: what actually happens on the show",3),
       step("Name three dream first guests, no vetting, just names",2)
     ]},
    {id:"writing-line",name:"The Writing Line",subtitle:"one river, three mouths",state:"motion",tier:"midstream",
     nextTouch:"Route the next deep piece before composing. The fork before the pen.",
     open:false,steps:[],
     subThreads:[
       {id:"substack",name:"Substack",state:"motion",tier:"midstream",
        nextTouch:"This week's piece or a note. The floor is presence, not essays.",
        open:false,steps:[
          step("Sift subscriber list, finish the deleting pass",1),
          step("Draft one note aimed at someone else's room",2)
        ]},
       {id:"newsletter",name:"Mailchimp newsletter",state:"foundation",tier:"midstream",
        nextTouch:"Get the next issue out the door in pieces, not in one heave.",
        open:false,steps:[
          step("Open the draft, read it once, change nothing",1),
          step("Fix the subject line",2),
          step("One formatting pass on the body",1),
          step("Hit send",3)
        ]},
       {id:"book",name:"The book",state:"simmer",tier:"deep-water",
        nextTouch:"Small pleasurable touches only. The book waits for France to get a date.",
        open:false,steps:[step("Bank one exquisite fragment when it arrives, no hunting",1)]}
     ]},
    {id:"labs-line",name:"The Labs Line",subtitle:"labs + page + pricing + money",state:"foundation",tier:"deep-water",
     nextTouch:"The pricing decision, made once, out loud, with the sacral. Everything downstream becomes couch work after.",
     open:false,steps:[
       step("Write the three pricing options on paper, no screens",2),
       step("Yes/no each one with the sacral, same day",3)
     ]},
    {id:"tpn-trunk",name:"Play Network trunk",subtitle:"model, web, marketing",state:"motion",tier:"couch",
     nextTouch:"Pull one web task from the couch queue during the next comfort-movie evening.",
     open:false,steps:[]}
  ],
  couchQueue:[
    {id:uid(),text:"Substack settings cleanup, confirm unsubscribe damage",done:false},
    {id:uid(),text:"Website link plumbing once lab pricing lands",done:false},
    {id:uid(),text:"Mailchimp formatting and send mechanics",done:false},
    {id:uid(),text:"Green map webpage scaffolding, structure only",done:false}
  ],
  anchors:[],
  publishing:{substackDay:4,newsletterDayOfMonth:1}
};

// ---- date helpers ----
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const addDays=(s,n)=>{const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d+n);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`};
const prettyDate=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})};
const nextWeekday=w=>{const now=new Date();const diff=(w-now.getDay()+7)%7;const dt=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diff);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`};
const nextMonthDay=day=>{const now=new Date();let dt=new Date(now.getFullYear(),now.getMonth(),day);const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());if(dt<today)dt=new Date(now.getFullYear(),now.getMonth()+1,day);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`};
const daysUntil=s=>{const[y,m,d]=s.split('-').map(Number);const target=new Date(y,m-1,d);const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.round((target-today)/86400000)};

// ---- state ----
let STATE = (()=>{try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):DEFAULT_STATE}catch{return DEFAULT_STATE}})();
const save=()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(STATE))}catch(e){console.error('save failed',e)}};
let saveTimer=null;
const queueSave=()=>{clearTimeout(saveTimer);saveTimer=setTimeout(save,600)};
const set=(fn)=>{STATE=fn(STATE);queueSave();render()};

// ---- small el helpers ----
const el=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='checked'||k==='disabled')e[k]=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
};
const div=(s={},c=[])=>el('div',{style:s},c);
const span=(s,c)=>el('span',{style:typeof s==='object'?s:{}},typeof s==='string'?[s]:(c||[]));
const p=(s,txt)=>el('p',{style:s},[txt]);
const btn=(label,onClick,s={})=>el('button',{onClick,style:{background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',...s}},[label]);

// ---- chips ----
const stateChip=(state,onCycle)=>{
  const s=STATES[state];
  return el('button',{onClick:onCycle,title:`${s.note}. Click to change.`,style:{
    background:s.pale,color:s.color,border:`1px solid ${s.color}44`,
    borderRadius:999,padding:'2px 10px',fontSize:12,fontWeight:600,cursor:'pointer',
    letterSpacing:'0.02em',fontFamily:'inherit'
  }},[s.label]);
};
const tierChip=(tier,onCycle)=>{
  const t=TIERS[tier];
  return el('button',{onClick:onCycle,title:'Attention tier. Click to change.',style:{
    background:'transparent',color:t.color,border:`1px dashed ${t.color}66`,
    borderRadius:999,padding:'2px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'
  }},[t.label]);
};
const pressureDots=(pressure,onCycle)=>{
  const colors={1:C.faint,2:C.copper,3:C.madder};
  const wrap=el('button',{onClick:onCycle,title:`Pressure: ${pressure===1?'low':pressure===2?'medium':'high'}. Click to change.`,style:{
    background:'none',border:'none',cursor:'pointer',padding:'2px 4px',display:'flex',gap:'3px',alignItems:'center',fontFamily:'inherit'
  }});
  [1,2,3].forEach(n=>{
    wrap.appendChild(el('span',{style:{
      width:'7px',height:'7px',borderRadius:'50%',display:'inline-block',
      background:n<=pressure?colors[pressure]:'transparent',
      border:`1px solid ${n<=pressure?'transparent':C.line}`
    }}));
  });
  return wrap;
};

// ---- step row ----
const stepRow=(s,onUpdate,onDelete)=>{
  const row=div({display:'flex',alignItems:'center',gap:'8px',padding:'5px 0',borderBottom:`1px solid ${C.paper}`});
  const cb=el('input',{type:'checkbox',checked:s.done,onChange:()=>onUpdate({...s,done:!s.done,today:s.done?s.today:false}),
    style:{accentColor:C.moss,width:'15px',height:'15px',cursor:'pointer',flexShrink:0}});
  const txt=el('span',{style:{flex:1,fontSize:'13.5px',lineHeight:1.45,
    color:s.done?C.faint:C.ink,textDecoration:s.done?'line-through':'none'}},[s.text]);
  const pd=pressureDots(s.pressure,()=>onUpdate({...s,pressure:(s.pressure%3)+1}));
  const todayBtn=el('button',{
    onClick:()=>onUpdate({...s,today:!s.today}),
    title:s.today?'Pinned to today. Click to unpin.':'Pin to today',
    style:{
      background:s.today?C.mossPale:'transparent',border:`1px solid ${s.today?C.moss:C.line}`,
      color:s.today?C.moss:C.faint,borderRadius:'6px',fontSize:'10.5px',padding:'2px 7px',
      cursor:'pointer',fontWeight:600,fontFamily:'inherit'
    }
  },['today']);
  const del=el('button',{onClick:onDelete,title:'Remove',style:{background:'none',border:'none',color:C.faint,cursor:'pointer',fontSize:'14px',padding:'0 2px',fontFamily:'inherit'}},['×']);
  [cb,txt,pd,todayBtn,del].forEach(x=>row.appendChild(x));
  return row;
};

// ---- step list ----
const stepList=(steps,onChange)=>{
  const wrap=div({marginTop:'6px'});
  const sorted=[...steps].sort((a,b)=>(a.done-b.done)||(b.pressure-a.pressure));
  sorted.forEach(s=>{
    wrap.appendChild(stepRow(s,
      updated=>onChange(steps.map(x=>x.id===s.id?updated:x)),
      ()=>onChange(steps.filter(x=>x.id!==s.id))
    ));
  });
  const inp=el('input',{
    type:'text',placeholder:'Add a micro-step, small enough to start',
    style:{width:'100%',marginTop:'7px',padding:'6px 10px',fontSize:'13px',borderRadius:'7px',border:`1px solid ${C.line}`},
    onKeydown:e=>{
      if(e.key==='Enter'&&e.target.value.trim()){
        onChange([...steps,step(e.target.value.trim())]);
        e.target.value='';
      }
    }
  });
  wrap.appendChild(inp);
  return wrap;
};

// ---- editable next touch ----
const editableTouch=(value,onChange)=>{
  const wrap=div({});
  const showP=()=>{
    wrap.innerHTML='';
    const txt=el('p',{
      title:'Click to edit',
      style:{fontSize:'13.5px',lineHeight:1.5,color:C.ink,margin:'4px 0 0',cursor:'text',fontStyle:'italic'}
    },[value]);
    txt.onclick=()=>{
      wrap.innerHTML='';
      const ta=el('textarea',{rows:2,style:{
        width:'100%',fontSize:'13.5px',lineHeight:1.5,border:`1px solid ${C.moss}`,
        borderRadius:'7px',padding:'6px 9px',fontFamily:'inherit',color:C.ink,resize:'vertical'
      }},[value]);
      ta.onblur=()=>{onChange(ta.value.trim()||value);value=ta.value.trim()||value;showP()};
      wrap.appendChild(ta);
      ta.focus();
    };
    wrap.appendChild(txt);
  };
  showP();
  return wrap;
};

// ---- sub-thread card ----
const subThreadCard=(t,onPatch)=>{
  const s=STATES[t.state];
  const card=div({
    borderLeft:`3px solid ${s.color}`,background:C.paper,
    borderRadius:'0 8px 8px 0',padding:'9px 12px',marginTop:'8px'
  });
  const header=div({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'});
  header.appendChild(el('span',{style:{fontWeight:600,fontSize:'13.5px',color:C.ink}},[t.name]));
  header.appendChild(stateChip(t.state,()=>{
    t.state=STATE_ORDER[(STATE_ORDER.indexOf(t.state)+1)%4];
    onPatch({state:t.state});
  }));
  header.appendChild(tierChip(t.tier,()=>{
    t.tier=TIER_ORDER[(TIER_ORDER.indexOf(t.tier)+1)%3];
    onPatch({tier:t.tier});
  }));
  card.appendChild(header);
  card.appendChild(editableTouch(t.nextTouch,v=>onPatch({nextTouch:v})));
  const openCount=t.steps.filter(s=>!s.done).length;
  const toggleBtn=el('button',{
    onClick:()=>{t.open=!t.open;onPatch({open:t.open})},
    style:{background:'none',border:'none',color:C.soft,cursor:'pointer',fontSize:'12px',
      padding:'6px 0 0',display:'flex',alignItems:'center',gap:'5px',fontWeight:600,fontFamily:'inherit'}
  },[`▸ ${openCount>0?`${openCount} micro-step${openCount===1?'':'s'} open`:'micro-steps'}`]);
  card.appendChild(toggleBtn);
  if(t.open)card.appendChild(stepList(t.steps,steps=>onPatch({steps})));
  return card;
};

// ---- thread card ----
const threadCard=(t,onPatch,onPatchSub)=>{
  const s=STATES[t.state];
  const card=div({
    background:C.card,border:`1px solid ${C.line}`,borderLeft:`4px solid ${s.color}`,
    borderRadius:'10px',padding:'13px 16px',marginBottom:'12px'
  });
  const header=div({display:'flex',alignItems:'baseline',gap:'9px',flexWrap:'wrap'});
  header.appendChild(el('h3',{style:{margin:0,fontSize:'16px',color:C.ink,fontWeight:700}},[t.name]));
  header.appendChild(el('span',{style:{fontSize:'12px',color:C.faint}},[t.subtitle||'']));
  const chips=div({marginLeft:'auto',display:'flex',gap:'6px'});
  chips.appendChild(stateChip(t.state,()=>{
    t.state=STATE_ORDER[(STATE_ORDER.indexOf(t.state)+1)%4];
    onPatch({state:t.state});
  }));
  chips.appendChild(tierChip(t.tier,()=>{
    t.tier=TIER_ORDER[(TIER_ORDER.indexOf(t.tier)+1)%3];
    onPatch({tier:t.tier});
  }));
  header.appendChild(chips);
  card.appendChild(header);
  if(t.state==='fog'){
    card.appendChild(el('p',{style:{fontSize:'12px',color:C.slate,margin:'5px 0 0',fontWeight:600}},
      ['Fog: deciding conversations only. Production energy has nothing to grip here.']));
  }
  card.appendChild(editableTouch(t.nextTouch,v=>onPatch({nextTouch:v})));
  if(!t.subThreads){
    const openCount=t.steps.filter(s=>!s.done).length;
    const toggleBtn=el('button',{
      onClick:()=>{t.open=!t.open;onPatch({open:t.open})},
      style:{background:'none',border:'none',color:C.soft,cursor:'pointer',fontSize:'12px',
        padding:'6px 0 0',display:'flex',alignItems:'center',gap:'5px',fontWeight:600,fontFamily:'inherit'}
    },[`▸ ${openCount>0?`${openCount} micro-step${openCount===1?'':'s'} open`:'micro-steps'}`]);
    card.appendChild(toggleBtn);
    if(t.open)card.appendChild(stepList(t.steps,steps=>onPatch({steps})));
  } else {
    t.subThreads.forEach(sub=>{
      card.appendChild(subThreadCard(sub,patch=>{
        Object.assign(sub,patch);
        onPatchSub(sub.id,patch);
      }));
    });
  }
  return card;
};

// ---- horizon ----
const horizonPanel=()=>{
  const tStr=todayStr();
  const tmStr=addDays(tStr,1);
  const card=div({background:C.card,border:`1px solid ${C.line}`,borderRadius:'10px',padding:'14px 16px',marginBottom:'14px'});

  // header
  const hdr=div({display:'flex',alignItems:'baseline',gap:'10px',flexWrap:'wrap'});
  hdr.appendChild(el('h2',{style:{margin:0}},[' The horizon']));
  hdr.appendChild(el('span',{style:{fontSize:'13px',color:C.soft,fontStyle:'italic'}},['What moves the boat today?']));
  card.appendChild(hdr);

  // pinned today steps
  const pinned=[];
  const collect=(t,threadName)=>t.steps.forEach(s=>{if(s.today&&!s.done)pinned.push({...s,threadName})});
  STATE.threads.forEach(t=>{collect(t,t.name);(t.subThreads||[]).forEach(sub=>collect(sub,sub.name))});
  pinned.sort((a,b)=>b.pressure-a.pressure);
  const pinnedWrap=div({marginTop:'9px'});
  if(pinned.length>0){
    pinned.forEach(p=>{
      const row=div({display:'flex',alignItems:'center',gap:'8px',padding:'4px 0'});
      const dot=el('span',{style:{width:'8px',height:'8px',borderRadius:'50%',display:'inline-block',flexShrink:0,
        background:p.pressure===3?C.madder:p.pressure===2?C.copper:C.faint}});
      row.appendChild(dot);
      row.appendChild(el('span',{style:{fontSize:'14px',color:C.ink,flex:1}},[p.text]));
      row.appendChild(el('span',{style:{fontSize:'11.5px',color:C.faint}},[p.threadName]));
      pinnedWrap.appendChild(row);
    });
    if(pinned.length>3){
      pinnedWrap.appendChild(el('p',{style:{fontSize:'12px',color:C.madder,margin:'6px 0 0',fontWeight:600}},
        [`${pinned.length} pinned. Three is the ceiling; the research is firm on this. Unpin until it hurts a little.`]));
    }
  } else {
    pinnedWrap.appendChild(el('p',{style:{fontSize:'13px',color:C.faint,margin:'9px 0 0'}},
      ['Nothing pinned yet. Open a thread, find the smallest true step, pin it here.']));
  }
  card.appendChild(pinnedWrap);

  // publishing rhythm
  const pub=div({borderTop:`1px solid ${C.paper}`,marginTop:'11px',paddingTop:'9px',display:'flex',gap:'16px',flexWrap:'wrap'});
  const subDate=nextWeekday(STATE.publishing.substackDay);
  const newsDate=nextMonthDay(STATE.publishing.newsletterDayOfMonth);
  [{label:'Substack',date:subDate},{label:'Newsletter',date:newsDate}].forEach(({label,date})=>{
    const days=daysUntil(date);
    const urgent=days<=1;
    pub.appendChild(el('span',{style:{
      fontSize:'12.5px',fontWeight:urgent?700:500,
      color:urgent?C.madder:C.soft,
      background:urgent?C.madderPale:'transparent',
      borderRadius:'6px',padding:urgent?'2px 8px':'2px 0'
    }},[`${label} · ${prettyDate(date)} · ${days===0?'today':days===1?'tomorrow':`${days} days`}`]));
  });
  card.appendChild(pub);

  // anchors
  const anchors=[...STATE.anchors].sort((a,b)=>a.date.localeCompare(b.date));
  if(anchors.length>0){
    const anchorWrap=div({borderTop:`1px solid ${C.paper}`,marginTop:'9px',paddingTop:'8px'});
    const groups={today:[],tomorrow:[],ahead:[],past:[]};
    anchors.forEach(a=>{
      if(a.date===tStr)groups.today.push(a);
      else if(a.date===tmStr)groups.tomorrow.push(a);
      else if(a.date>tmStr)groups.ahead.push(a);
      else groups.past.push(a);
    });
    [...groups.today,...groups.tomorrow,...groups.ahead,...groups.past].forEach(a=>{
      const dim=a.date<tStr;
      const row=div({display:'flex',alignItems:'center',gap:'8px',padding:'3px 0'});
      row.appendChild(el('span',{style:{fontSize:'12px',color:dim?C.faint:C.copper,fontWeight:600,minWidth:'78px',textDecoration:dim?'line-through':'none'}},[prettyDate(a.date)]));
      row.appendChild(el('span',{style:{fontSize:'13px',color:dim?C.faint:C.ink,flex:1,textDecoration:dim?'line-through':'none'}},[a.label]));
      const del=el('button',{onClick:()=>{
        set(st=>({...st,anchors:st.anchors.filter(x=>x.id!==a.id)}));
      },style:{background:'none',border:'none',color:C.faint,cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}},['×']);
      row.appendChild(del);
      anchorWrap.appendChild(row);
    });
    card.appendChild(anchorWrap);
  }

  // add anchor
  const addRow=div({display:'flex',gap:'8px',marginTop:'10px',flexWrap:'wrap'});
  const labelInp=el('input',{type:'text',placeholder:'Add a dated anchor (Goosey call, SUNS circle, send that email)',
    style:{flex:'2',minWidth:'220px',padding:'6px 10px',fontSize:'13px'}});
  const dateInp=el('input',{type:'date',value:tStr,style:{padding:'5px 8px',fontSize:'13px',minWidth:'140px'}});
  labelInp.onkeydown=e=>{
    if(e.key==='Enter'&&labelInp.value.trim()){
      set(st=>({...st,anchors:[...st.anchors,{id:uid(),label:labelInp.value.trim(),date:dateInp.value||tStr}]}));
      labelInp.value='';
    }
  };
  addRow.appendChild(labelInp);
  addRow.appendChild(dateInp);
  card.appendChild(addRow);
  return card;
};

// ---- couch queue ----
const couchPanel=()=>{
  const card=div({background:C.card,border:`1px solid ${C.line}`,borderRadius:'10px',padding:'13px 16px',marginBottom:'12px'});
  card.appendChild(div({display:'flex',alignItems:'baseline',gap:'9px'},[
    el('h3',{style:{margin:0,fontSize:'15px'}},['The couch queue']),
    el('span',{style:{fontSize:'12px',color:C.faint}},['advancing a thread from the couch is advancing a thread'])
  ]));
  const list=div({marginTop:'7px'});
  STATE.couchQueue.forEach(it=>{
    const row=div({display:'flex',alignItems:'center',gap:'8px',padding:'4px 0'});
    const cb=el('input',{type:'checkbox',checked:it.done,
      onChange:()=>set(st=>({...st,couchQueue:st.couchQueue.map(x=>x.id===it.id?{...x,done:!x.done}:x)})),
      style:{accentColor:C.slate,width:'15px',height:'15px',cursor:'pointer'}});
    const txt=el('span',{style:{fontSize:'13.5px',flex:1,color:it.done?C.faint:C.ink,textDecoration:it.done?'line-through':'none'}},[it.text]);
    const del=el('button',{onClick:()=>set(st=>({...st,couchQueue:st.couchQueue.filter(x=>x.id!==it.id)})),
      style:{background:'none',border:'none',color:C.faint,cursor:'pointer',fontSize:'14px',fontFamily:'inherit'}},['×']);
    [cb,txt,del].forEach(x=>row.appendChild(x));
    list.appendChild(row);
  });
  card.appendChild(list);
  const inp=el('input',{type:'text',placeholder:'Add couch work, rewatch-a-movie tier',
    style:{width:'100%',marginTop:'7px',padding:'6px 10px',fontSize:'13px'},
    onKeydown:e=>{
      if(e.key==='Enter'&&e.target.value.trim()){
        set(st=>({...st,couchQueue:[...st.couchQueue,{id:uid(),text:e.target.value.trim(),done:false}]}));
        e.target.value='';
      }
    }});
  card.appendChild(inp);
  return card;
};

// ---- publishing settings ----
const publishingPanel=()=>{
  const card=div({background:C.card,border:`1px solid ${C.line}`,borderRadius:'10px',padding:'13px 16px',marginBottom:'12px'});
  card.appendChild(el('h3',{style:{margin:0,fontSize:'15px'}},['Publishing rhythm']));
  card.appendChild(el('p',{style:{fontSize:'12.5px',color:C.soft,margin:'4px 0 10px'}},
    ['Real dates the horizon counts down to. Set once, leave alone.']));
  const row=div({display:'flex',gap:'18px',flexWrap:'wrap',alignItems:'center'});
  const subLabel=el('label',{style:{fontSize:'13px',color:C.ink,display:'flex',gap:'8px',alignItems:'center'}},['Substack, weekly on']);
  const subSel=el('select',{
    style:{border:`1px solid ${C.line}`,borderRadius:'7px',padding:'4px 8px',fontSize:'13px'},
    onChange:e=>set(st=>({...st,publishing:{...st.publishing,substackDay:Number(e.target.value)}}))
  });
  DAYS.forEach((d,i)=>{
    const opt=el('option',{value:i},[d]);
    if(i===STATE.publishing.substackDay)opt.selected=true;
    subSel.appendChild(opt);
  });
  subLabel.appendChild(subSel);
  const newsLabel=el('label',{style:{fontSize:'13px',color:C.ink,display:'flex',gap:'8px',alignItems:'center'}},['Newsletter, monthly on day']);
  const newsInp=el('input',{type:'number',value:STATE.publishing.newsletterDayOfMonth,min:1,max:28,
    style:{width:'52px',textAlign:'center',padding:'4px 8px',fontSize:'13px'},
    onChange:e=>set(st=>({...st,publishing:{...st.publishing,newsletterDayOfMonth:Math.max(1,Math.min(28,Number(e.target.value)||1))}}))
  });
  newsLabel.appendChild(newsInp);
  [subLabel,newsLabel].forEach(x=>row.appendChild(x));
  card.appendChild(row);
  return card;
};

// ---- header ----
const headerEl=()=>{
  const wrap=div({marginBottom:'14px'});
  const top=div({display:'flex',alignItems:'baseline',gap:'12px',flexWrap:'wrap'});
  top.appendChild(el('h1',{style:{margin:0}},[' The Loom']));
  top.appendChild(el('span',{style:{fontSize:'13px',color:C.soft}},['four threads, one fabric, clean landings']));
  const actions=div({marginLeft:'auto',display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'});
  actions.appendChild(el('a',{href:'https://nataliekinsey-crypto.github.io/focuswheel/',target:'_blank',rel:'noreferrer',
    style:{fontSize:'12.5px',color:C.moss,fontWeight:700,textDecoration:'none',
      border:`1px solid ${C.moss}55`,borderRadius:'999px',padding:'4px 12px',background:C.mossPale}},
    ['Focus wheel ↗']));
  let copied=false;
  const copyBtn=el('button',{
    onClick:async()=>{
      try{await navigator.clipboard.writeText('LOOM STATE for check-in:\n'+JSON.stringify(STATE,null,2));
        copyBtn.textContent='Copied';copied=true;setTimeout(()=>{copyBtn.textContent='Copy state for loom check';copied=false},2000);}
      catch(e){console.error(e);}
    },
    style:{fontSize:'12.5px',color:C.soft,background:'transparent',border:`1px solid ${C.line}`,
      borderRadius:'999px',padding:'4px 12px',cursor:'pointer',fontFamily:'inherit'}
  },['Copy state for loom check']);
  actions.appendChild(copyBtn);
  top.appendChild(actions);
  wrap.appendChild(top);

  // gauge
  const gaugeRow=div({display:'flex',alignItems:'center',gap:'10px',marginTop:'10px',flexWrap:'wrap'});
  gaugeRow.appendChild(el('label',{style:{fontSize:'13px',color:C.soft}},['Hartmann gauge']));
  const gaugeStatus=el('span',{style:{fontSize:'12.5px',fontWeight:600}});
  const updateGaugeStatus=g=>{
    if(g===null||g===''){gaugeStatus.textContent='';gaugeStatus.style.color=C.faint;return;}
    if(g<=0){gaugeStatus.textContent='Gate closed for deep water. Focus wheel, FYFF, or tapping first.';gaugeStatus.style.color=C.madder;}
    else{gaugeStatus.textContent='Plus side. Deep water is open.';gaugeStatus.style.color=C.moss;}
  };
  const gaugeInp=el('input',{type:'number',min:-10,max:10,
    value:STATE.gauge===null?'':STATE.gauge,
    placeholder:'?',
    style:{width:'54px',textAlign:'center',padding:'4px 8px',fontSize:'14px'},
    onInput:e=>{
      const v=e.target.value===''?null:Math.max(-10,Math.min(10,Number(e.target.value)));
      set(st=>({...st,gauge:v}));
      updateGaugeStatus(v);
    }
  });
  updateGaugeStatus(STATE.gauge);
  gaugeRow.appendChild(gaugeInp);
  gaugeRow.appendChild(gaugeStatus);
  wrap.appendChild(gaugeRow);
  return wrap;
};

// ---- main render ----
const render=()=>{
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(headerEl());
  app.appendChild(horizonPanel());
  STATE.threads.forEach(t=>{
    app.appendChild(threadCard(
      t,
      patch=>{Object.assign(t,patch);set(st=>({...st,threads:st.threads.map(x=>x.id===t.id?t:x)}))},
      (subId,patch)=>{
        const sub=t.subThreads&&t.subThreads.find(s=>s.id===subId);
        if(sub){Object.assign(sub,patch);set(st=>({...st,threads:st.threads.map(x=>x.id===t.id?t:x)}));}
      }
    ));
  });
  app.appendChild(couchPanel());
  app.appendChild(publishingPanel());
  app.appendChild(el('p',{style:{fontSize:'11.5px',color:C.faint,textAlign:'center',margin:'18px 0 6px'}},
    ['State saves automatically to your browser. Use "Copy state for loom check" to bring it into a conversation.']));
};

render();
</script>
</body>
</html>
